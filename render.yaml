services:
  - type: web
    name: convert
    runtime: docker
    repo: https://github.com/p2r3/convert
    branch: master
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: standard        # Chromium/puppeteer build needs real CPU/RAM — starter (free) will likely OOM or time out
    healthCheckPath: /convert/
    autoDeployTrigger: commit
    envVars:
      - key: VITE_COMMIT_SHA
        sync: false        # set manually per deploy, or drop this and let the build default
